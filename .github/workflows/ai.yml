name: Ollama Node en GitHub Actions

on:
  workflow_dispatch: # Para activarlo manualmente desde la web

jobs:
  run-ollama:
    runs-on: ubuntu-latest
    steps:
    - name: Instalar WireGuard y Ollama
      run: |
        # 1. Actualizar sistema e instalar WireGuard
        sudo apt-get update && sudo apt-get install -y wireguard

        # 2. Instalar Ollama de forma oficial
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Configurar e iniciar Túnel IPv6 (WireGuard)
      run: |
        sudo mkdir -p /etc/wireguard
        cat <<EOF | sudo tee /etc/wireguard/wg0.conf
        [Interface]
        PrivateKey = ${{ secrets.WG_GITHUB_PRIVATE_KEY }}
        Address = 2600:1f18:5c47:df8::200/64 # <- ¡Sin corchetes aquí!

        [Peer]
        PublicKey = ${{ secrets.WG_VPS_PUBLIC_KEY }}
        Endpoint = [2600:1f18:5c47:df8:2445:7b1b:f640:dfd1]:51820
        AllowedIPs = ::/0
        PersistentKeepalive = 25
        EOF

        # Levantar la interfaz de red
        sudo wg-quick up wg0

    - name: Levantar Ollama con CORS Libre
      run: |
        # 1. Detener el servicio automático del sistema
        lscpu
        free -h
        df -h
        sudo systemctl stop ollama || true
        
        # 2. Configurar las variables globales para esta sesión
        export OLLAMA_HOST=0.0.0.0
        export OLLAMA_ORIGINS="*"
        
        # 3. Iniciar el servidor de Ollama en SEGUNDO PLANO (&) enviando los logs a un archivo
        ollama serve > /tmp/ollama_exec.log 2>&1 &
        
        # 4. Esperar 5 segundos a que el servidor inicialice por completo en la CPU
        sleep 5
        
        # 5. Descargar el modelo (Ahora sí conectará sin problemas)
        ollama pull qwen2.5:7b
        
        # 6. Mantener el contenedor vivo leyendo los logs en tiempo real para que el Action no se cierre
        tail -f /tmp/ollama_exec.log
